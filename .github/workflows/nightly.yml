name: Nightly Garmin -> Strava

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Override date (YYYY-MM-DD). Leave blank for yesterday."
        required: false
        default: ""
      steps:
        description: "Override steps (integer). Leave blank to use Garmin."
        required: false
        default: ""
      distance_m:
        description: "Override distance meters (integer). Leave blank to use Garmin."
        required: false
        default: ""
      speed_mps:
        description: "Override speed m/s for elapsed_time estimate (default 1.3)."
        required: false
        default: ""
      dry_run:
        description: "true/false. If true, prints payload and exits."
        required: false
        default: "false"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        run: |
          curl -Ls https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run script
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}

          OVERRIDE_DATE: ${{ inputs.date }}
          OVERRIDE_STEPS: ${{ inputs.steps }}
          OVERRIDE_DISTANCE_M: ${{ inputs.distance_m }}
          OVERRIDE_SPEED_MPS: ${{ inputs.speed_mps }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: uv run python main.py